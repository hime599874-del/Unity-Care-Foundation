<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>মানবিক সংগঠন | Unity Care Foundation</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=192&h=192&auto=format&fit=crop">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts with crossorigin attribute to prevent CORS issues with html-to-image -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&family=Dancing+Script:wght@600&display=swap" rel="stylesheet" crossorigin="anonymous">
    <link href="https://fonts.cdnfonts.com/css/jalliya" rel="stylesheet">
    
    <style>
        :root { 
            --bn-font: 'Hind Siliguri', sans-serif; 
            --signature-font: 'Jalliya', 'Dancing Script', cursive;
        }
        body {
            font-family: var(--bn-font);
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
            margin: 0;
            overflow-x: hidden;
            touch-action: pan-x pan-y;
        }
        .premium-text { font-family: 'Playfair Display', serif; }
        .signature-text { font-family: var(--signature-font); }
        .bn-heavy { font-weight: 900; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #0d9488; border-radius: 10px; }
        @media print { .no-print { display: none !important; } }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #0d9488; border-radius: 10px; }
        
        /* Utility to hide scrollbar on compact mobile views */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        body.modal-open .bottom-nav {
            display: none !important;
        }

        .clip-path-id-diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .clip-path-id-diagonal-left { clip-path: polygon(0 20%, 100% 0, 100% 100%, 0 80%); }
        .clip-path-id-diagonal-right { clip-path: polygon(0 0, 100% 20%, 100% 80%, 0 100%); }
        .clip-path-id-top-v { clip-path: polygon(0 0, 100% 0, 100% 40%, 50% 70%, 0 40%); }
        .writing-mode-vertical { writing-mode: vertical-rl; text-orientation: mixed; }

        /* Vibrant Colorful Under-glow Effect */
        .glow-card {
            position: relative;
            z-index: 1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: none !important;
            box-shadow: none !important;
        }

        .glow-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, var(--glow-color, currentColor), #ffffff, var(--glow-color, currentColor));
            filter: blur(15px);
            opacity: 0.6;
            z-index: -1;
            border-radius: inherit;
            transition: all 0.4s ease;
        }

        .glow-card::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 10%;
            right: 10%;
            height: 40%;
            background: var(--glow-color, currentColor);
            filter: blur(20px);
            opacity: 0.7;
            z-index: -2;
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        .glow-card:hover {
            transform: translateY(-4px) scale(1.05);
        }

        .glow-card:hover::before {
            opacity: 0.9;
            filter: blur(20px);
        }

        .glow-card:hover::after {
            opacity: 0.9;
            bottom: -15px;
            filter: blur(25px);
        }

        /* Remove standard black shadows from glow elements */
        .glow-card, .glow-card * {
            text-shadow: none !important;
        }

        svg:not(.no-glow) {
            filter: drop-shadow(0 0 8px var(--glow-color, currentColor));
        }

        button:hover:has(svg:not(.no-glow))::before,
        .icon-box:hover:has(svg:not(.no-glow))::before,
        .glow-card:hover::before {
            opacity: 0.45;
            filter: blur(25px);
            bottom: -8px;
            left: 5%;
            right: 5%;
        }

        /* Ensure SVG stays above the glow */
        svg:not(.no-glow) {
            position: relative;
            z-index: 1;
        }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "html-to-image": "https://esm.sh/html-to-image@^1.11.11"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
