<!DOCTYPE html>
<html lang="bn">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, proxy-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="build-version" content="1.0.2-march-10" />
    <script>
        // Immediate and aggressive cache/service worker clearing
        (function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister();
                    }
                });
            }
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    for (let name of names) {
                        caches.delete(name);
                    }
                });
            }
            // Clear local storage if it's a version mismatch (optional, but safer)
            const currentVersion = "1.0.2";
            if (localStorage.getItem('app_version') !== currentVersion) {
                localStorage.setItem('app_version', currentVersion);
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>মানবিক সংগঠন | Unity Care Foundation</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=192&h=192&auto=format&fit=crop">

    <!-- Google Fonts with crossorigin attribute to prevent CORS issues with html-to-image -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&family=Dancing+Script:wght@600&display=swap" rel="stylesheet" crossorigin="anonymous">
    
    <style>
        :root { 
            --bn-font: 'Hind Siliguri', sans-serif; 
            --signature-font: 'Dancing Script', cursive;
        }
        body {
            font-family: var(--bn-font);
            background-color: transparent;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
            margin: 0;
            overflow-x: hidden;
            touch-action: pan-x pan-y;
        }

        /* Clean White Background */
        .app-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -20;
            background: #ffffff;
            overflow: hidden;
        }

        .app-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        /* Glassmorphism Utilities - Simplified */
        .glass-card {
            background: #ffffff !important;
            border: 1px solid #f1f5f9 !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05) !important;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            border-top: 1px solid #f1f5f9 !important;
        }

        .premium-text { font-family: 'Playfair Display', serif; }
        .signature-text { font-family: var(--signature-font); }
        .bn-heavy { font-weight: 900; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #0d9488; border-radius: 10px; }
        @media print { .no-print { display: none !important; } }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #0d9488; border-radius: 10px; }
        
        /* Utility to hide scrollbar on compact mobile views */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        body.modal-open .bottom-nav {
            display: none !important;
        }

        .clip-path-id-diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .clip-path-id-diagonal-left { clip-path: polygon(0 20%, 100% 0, 100% 100%, 0 80%); }
        .clip-path-id-diagonal-right { clip-path: polygon(0 0, 100% 20%, 100% 80%, 0 100%); }
        .clip-path-id-top-v { clip-path: polygon(0 0, 100% 0, 100% 40%, 50% 70%, 0 40%); }
        .writing-mode-vertical { writing-mode: vertical-rl; text-orientation: mixed; }
    </style>

    <script type="module">
      // Standard Vite entry
    </script>
</head>
<body>
    <div class="app-bg"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
